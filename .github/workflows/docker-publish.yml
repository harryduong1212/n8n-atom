# Build n8n-atom from source and publish the Docker image to GHCR.
#
# Produces a multi-arch manifest (amd64 + arm64) at:
#   ghcr.io/harryduong1212/n8n-atom:latest    (on push to master)
#   ghcr.io/harryduong1212/n8n-atom:<version> (on semver tag)
#   ghcr.io/harryduong1212/n8n-atom:<sha>     (every build)

name: 'Build & Publish Docker Image'

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      # ── Get the source code ──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Multi-arch support ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate with GHCR ──
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Generate image tags and OCI labels ──
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
            type=semver,pattern={{version}}
            type=sha,prefix=

      # ── Node.js + pnpm setup ──
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      # ── Build n8n from source ──
      - name: Disable git hooks
        run: |
          export LEFTHOOK=0 HUSKY=0
          if [ -f scripts/prepare.mjs ]; then
            mv scripts/prepare.mjs scripts/prepare.mjs.bak
          fi
          echo "console.log('Prepare skipped (CI build)')" > scripts/prepare.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build n8n
        run: pnpm run build:n8n

      # ── Build & push the Docker image ──
      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/images/n8n/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
